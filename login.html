<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar - UNEED CRM</title>
    <link rel="icon" href="./assets/favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <img class="login-logo" src="./assets/uneed-logo-login.png" alt="UNEED" />
        <p class="eyebrow">Acesso seguro</p>
        <h1>Entrar no CRM UNEED</h1>
        <p class="login-mode" id="loginMode">A verificar modo de autenticação...</p>
        <form id="loginForm">
          <label>
            Email
            <input id="loginEmail" type="email" autocomplete="username" required placeholder="geral@uneed.pt" />
          </label>
          <label>
            Password
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="button accent" type="submit">Entrar</button>
          <p class="login-error" id="loginError" role="alert"></p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script>
      function supabaseClient() {
        const config = window.UNEED_SUPABASE || {};
        if (!config.url || !config.anonKey || !window.supabase) return null;
        return window.supabase.createClient(config.url, config.anonKey);
      }

      const authMode = supabaseClient() ? "supabase" : "local";
      document.querySelector("#loginMode").textContent = authMode === "supabase"
        ? "Modo online: Supabase Auth ativo."
        : "Modo local: Supabase ainda não configurado. Usa geral@uneed.pt / uneed-local.";

      document.querySelector("#loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.querySelector("#loginError");
        error.textContent = "";
        const client = supabaseClient();
        if (client) {
          const { error: authError } = await client.auth.signInWithPassword({
            email: document.querySelector("#loginEmail").value,
            password: document.querySelector("#loginPassword").value,
          });
          if (!authError) {
            window.location.href = "/";
            return;
          }
          error.textContent = "Email ou password incorretos no Supabase.";
          return;
        }

        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.querySelector("#loginEmail").value,
            password: document.querySelector("#loginPassword").value,
          }),
        });
        if (response.ok) {
          window.location.href = "/";
          return;
        }
        error.textContent = "Modo local: usa geral@uneed.pt / uneed-local, ou configura a anon public key do Supabase.";
      });
    </script>
  </body>
</html>
