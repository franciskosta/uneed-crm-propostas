<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Entrar - UNEED CRM</title>
    <link rel="icon" href="./assets/favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-card">
        <img class="login-logo" src="./assets/uneed-logo-login.png" alt="UNEED" />
        <p class="login-mode is-hidden" id="loginMode"></p>
        <form id="loginForm">
          <label>
            Email
            <input id="loginEmail" type="email" autocomplete="username" required placeholder="geral@uneed.pt" />
          </label>
          <label>
            Password
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <button class="button accent" type="submit">Entrar</button>
          <p class="login-error" id="loginError" role="alert"></p>
        </form>
        <form id="resetForm" class="is-hidden">
          <label>
            Nova password
            <input id="newPassword" type="password" autocomplete="new-password" required minlength="8" />
          </label>
          <label>
            Confirmar nova password
            <input id="confirmPassword" type="password" autocomplete="new-password" required minlength="8" />
          </label>
          <button class="button accent" type="submit">Guardar nova password</button>
          <p class="login-error" id="resetError" role="alert"></p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script>
      function supabaseClient() {
        const config = window.UNEED_SUPABASE || {};
        if (!config.url || !config.anonKey || !window.supabase) return null;
        return window.supabase.createClient(config.url, config.anonKey);
      }

      function authParams() {
        const params = new URLSearchParams(window.location.search);
        const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
        hashParams.forEach((value, key) => params.set(key, value));
        return params;
      }

      async function prepareRecoverySession(client, params) {
        const accessToken = params.get("access_token");
        const refreshToken = params.get("refresh_token");
        if (accessToken && refreshToken) {
          await client.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        }
        if (params.get("code")) {
          await client.auth.exchangeCodeForSession(window.location.href);
        }
      }

      const client = supabaseClient();
      const params = authParams();
      const isRecovery = params.get("type") === "recovery" || params.has("access_token") || params.has("code");
      const authMode = client ? "supabase" : "local";
      if (authMode === "local") {
        document.querySelector("#loginMode").textContent = "Modo local: usa geral@uneed.pt / uneed-local.";
        document.querySelector("#loginMode").classList.remove("is-hidden");
      }

      let recoverySessionPromise = Promise.resolve();
      if (client && isRecovery) {
        document.querySelector("#loginForm").classList.add("is-hidden");
        document.querySelector("#resetForm").classList.remove("is-hidden");
        document.querySelector("#loginMode").textContent = "Recuperação ativa: define uma nova password para continuar.";
        document.querySelector("#loginMode").classList.remove("is-hidden");
        recoverySessionPromise = prepareRecoverySession(client, params).catch(() => {
          document.querySelector("#resetError").textContent = "O link de recuperação expirou. Pede um novo email no Supabase.";
        });
      }

      document.querySelector("#loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.querySelector("#loginError");
        error.textContent = "";
        if (client) {
          const { error: authError } = await client.auth.signInWithPassword({
            email: document.querySelector("#loginEmail").value,
            password: document.querySelector("#loginPassword").value,
          });
          if (!authError) {
            window.location.href = "/";
            return;
          }
          error.textContent = "Email ou password incorretos no Supabase.";
          return;
        }

        const response = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.querySelector("#loginEmail").value,
            password: document.querySelector("#loginPassword").value,
          }),
        });
        if (response.ok) {
          window.location.href = "/";
          return;
        }
        error.textContent = "Modo local: usa geral@uneed.pt / uneed-local, ou configura a anon public key do Supabase.";
      });

      document.querySelector("#resetForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        const error = document.querySelector("#resetError");
        error.textContent = "";
        const password = document.querySelector("#newPassword").value;
        const confirmation = document.querySelector("#confirmPassword").value;
        if (password !== confirmation) {
          error.textContent = "As passwords não coincidem.";
          return;
        }
        if (!client) {
          error.textContent = "Supabase não está configurado neste ambiente.";
          return;
        }
        await recoverySessionPromise;
        const { error: updateError } = await client.auth.updateUser({ password });
        if (updateError) {
          error.textContent = "Não foi possível atualizar a password. Pede um novo link de recuperação.";
          return;
        }
        document.querySelector("#loginMode").textContent = "Password atualizada. A entrar no CRM...";
        window.history.replaceState({}, document.title, "/login.html");
        setTimeout(() => {
          window.location.href = "/";
        }, 700);
      });
    </script>
  </body>
</html>
